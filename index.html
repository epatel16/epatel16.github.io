    a:focus,

      color: #f09228;
      text-decoration: none;
    }

    body,
    td,
    th,
    tr,
    p {
      font-family: 'Lato', Verdana, Helvetica, sans-serif;
      font-size: 15px
    }

    abs {
      font-family: 'Lato';
      font-style: italic;
      font-size: 14px
    }

    a {
      font-family: 'Lato', Verdana, Helvetica, sans-serif;
      font-size: 15px
    }

    strong {
      font-family: 'Lato', Verdana, Helvetica, sans-serif;

    }

    heading {
      font-family: 'Lato', Verdana, Helvetica, sans-serif;

    }

    papertitle {
      font-family: 'Lato', Verdana, Helvetica, sans-serif;
      font-size: 18px;
      font-weight: 700
    }

    name {

      width: 160px;

  <title>Neil Janwani</title>
  <meta http-equiv="Content-Type" content="text/html; charset=us-ascii">
  <link href='https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic' rel='stylesheet' type='text/css'>
  <link rel="icon" href="images/favicon/handshake.png" type="image/png">
</head>

<body>

  <table width="800" border="0" align="center" cellspacing="0" cellpadding="0">
    <tr>
      <td>
        <!-- Introduction Section -->
        <div id="intro"></div>

        <!-- Papers Section -->
        <div id="papers"></div>

        <!-- Projects Section -->
        <div id="projects"></div>

        <table width="100%" align="center" border="0" cellspacing="0" cellpadding="20">
          <tr>
            <td>
              <br>
              <p align="right">
                <font size="2">
                  Website design courtesy of <a href="https://jonbarron.info/"><strong>Jon Barron</strong></a>
                </font>
              </p>
            </td>
          </tr>
        </table>

        </td>
    </tr>
  </table>

  <script xml:space="preserve" language="JavaScript">
    function toggleblock(id) {
      var element = document.getElementById(id);
      if (element.style.display == 'none')
        element.style.display = 'block';
      else
        element.style.display = 'none';
    }

    function hideallabs() {
      var elements = document.getElementsByTagName('abs');
      for (var i = 0; i < elements.length; i++)
        elements[i].style.display = 'none';
    }

    async function loadEntries(jsonFile, containerId, inlineAbstract, imageRight) {
      try {
        const response = await fetch(jsonFile);
        const papers = await response.json();
        const container = document.getElementById(containerId);

        if (!container) return;
        container.innerHTML = '';

        papers.forEach(paper => {
          const authorsHtml = paper.authors.map(author => {
            let authorHtml = author.highlight ? `<strong>${author.name}</strong>` : author.name;
            if (author.superscript) {
              authorHtml += `<sup>${author.superscript}</sup>`;
            }
            return authorHtml;
          }).join(', ');

          const paperRow = document.createElement('table');
          paperRow.width = '100%';
          paperRow.align = 'center';
          paperRow.border = '0';
          paperRow.cellSpacing = '0';
          paperRow.cellPadding = '20';

          const titleHref = paper.website || paper.arxivUrl;
          const links = [];
          if (paper.arxivUrl) links.push(`<a href="${paper.arxivUrl}">arXiv</a>`);
          if (paper.code) links.push(`<a href="${paper.code}">code</a>`);
          if (paper.abstract && !inlineAbstract) links.push(`<a href="javascript:toggleblock('${paper.id}_abs')">abstract</a>`);

          const venueLine = [paper.venue, paper.year].filter(Boolean).join(', ');
          const thumbnailCell = paper.thumbnail
            ? `<td width="40%" valign="top" align="center">
                <img src="${paper.thumbnail}" alt="${paper.thumbnailAlt}" width="300" style="padding-top:0px;padding-bottom:0px;border-radius:15px;border:1px solid black">
              </td>`
            : '';

          const textCell = `
              <td width="${paper.thumbnail ? '60%' : '100%'}" valign="top">
                <p>${titleHref ? `<a href="${titleHref}">` : ''}
                <papertitle>${paper.title}</papertitle>${titleHref ? `</a>` : ''}<br>
                ${authorsHtml}<br>
                ${venueLine ? `<em>${paper.venue}</em>${paper.venue && paper.year ? ', ' : ''}${paper.year || ''}<br>` : ''}
                </p>

                ${inlineAbstract && paper.abstract ? `<p align="justify">${paper.abstract}</p>` : ''}
                <div class="paper" id="${paper.id}">
                    ${links.join(' | ')}
                    ${paper.abstract && !inlineAbstract ? `<abs align="justify" id="${paper.id}_abs"> ${paper.abstract}</abs>` : ''}
                </div>
              </td>`;

          paperRow.innerHTML = `
            <tr>
              ${imageRight ? textCell + thumbnailCell : thumbnailCell + textCell}
            </tr>
          `;

          container.appendChild(paperRow);
        });

        hideallabs();
      } catch (error) {
        console.error('Error loading entries from ' + jsonFile + ':', error);
      }
    }

    function loadPapers() {
      loadEntries('data/papers.json', 'papers-container');
    }

    function loadProjects() {
      loadEntries('data/projects.json', 'projects-container', true, true);
    }

    function loadSection(file, elementId) {
      fetch(file)
        .then(response => response.text())
        .then(html => {
          document.getElementById(elementId).innerHTML = html;
          if (elementId === 'papers') {
            loadPapers();
          } else if (elementId === 'projects') {
            loadProjects();
          } else if (elementId === 'intro') {
            // News section lives inside the intro markup; load it once intro is in the DOM
            loadSection('sections/news.html', 'news');
          } else {
            hideallabs();
          }
        });
    }

    loadSection('sections/intro.html', 'intro');
    loadSection('sections/papers.html', 'papers');
    loadSection('sections/projects.html', 'projects');
  </script>
</body>

</html>

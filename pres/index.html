    <style>
        html, body {

            padding: 0;

        .container video.vr {
            height: 60vh;
            max-width: 30vw;
        }

</head>
<body>
    <div class="container">
        <video class="cropped" src="../videos/NaviGait_hero_push_cropped.mp4" autoplay loop muted playsinline></video>
        <video class="vr" src="../videos/hero_push_vr.mp4" autoplay loop muted playsinline></video>
    </div>
